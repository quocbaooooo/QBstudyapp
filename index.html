<!doctype html>
<html class="dark" lang="vi" style="overflow-x: hidden;">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QBStudy - Học thông minh, hiệu quả</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              tertiary: "#ff6c95", "outline-variant": "#40485d", "surface-bright": "#1f2b49", "on-tertiary-container": "#100003",
              "on-surface-variant": "#a3aac4", "error-container": "#a70138", "secondary-fixed-dim": "#00d7f0",
              "on-background": "#dee5ff", "surface-tint": "#c59aff", "on-secondary-container": "#e8fbff",
              "inverse-surface": "#faf8ff", "surface-container-highest": "#192540", surface: "#060e20",
              "surface-container-low": "#091328", "secondary-dim": "#00d4ec", "on-tertiary-fixed": "#380014",
              error: "#ff6e84", "on-surface": "#dee5ff", "inverse-primary": "#7e29df", "primary-fixed": "#ba88ff",
              "on-secondary-fixed": "#003a42", "tertiary-fixed": "#ff8fa9", "primary-dim": "#9547f7",
              "on-tertiary": "#48001c", "on-secondary-fixed-variant": "#005964", "surface-variant": "#192540",
              "on-tertiary-fixed-variant": "#770033", "tertiary-fixed-dim": "#ff769b", secondary: "#00e3fd",
              "error-dim": "#d73357", outline: "#6d758c", "on-primary": "#420082", primary: "#c59aff",
              "on-error": "#490013", "inverse-on-surface": "#4d556b", "secondary-fixed": "#26e6ff",
              "tertiary-dim": "#ff6c95", "on-error-container": "#ffb2b9", "secondary-container": "#006875",
              "tertiary-container": "#fd3e80", background: "#060e20", "on-secondary": "#004d57",
              "surface-container": "#0f1930", "on-primary-fixed-variant": "#3f007c", "surface-container-lowest": "#000000",
              "surface-dim": "#060e20", "on-primary-fixed": "#000000", "primary-container": "#ba88ff",
              "primary-fixed-dim": "#b075ff", "surface-container-high": "#141f38", "on-primary-container": "#330066"
            },
            fontFamily: { headline: ["Inter"], body: ["Inter"], label: ["Inter"] }
          }
        }
      }
    </script>
    <style>
      body { font-family: 'Inter', sans-serif; background-color: #060e20; overflow-x: hidden; min-height: 100dvh; }
      .glass-card { background: rgba(15, 25, 48, 0.6); backdrop-filter: blur(32px); border: 1.5px solid rgba(64, 72, 93, 0.3); box-shadow: inset 0 1px 0 rgba(186, 136, 255, 0.1); }
      .active-glow { box-shadow: 0 0 15px rgba(0, 227, 253, 0.3); }
      .neon-border { border: 1px solid rgba(197, 154, 255, 0.2); }
      .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
      .abstract-blob { position: fixed; z-index: -1; filter: blur(80px); border-radius: 50%; opacity: 0.4; }
    </style>
  </head>
  <body class="text-on-surface bg-background min-h-screen">
    <!-- Abstract Blobs -->
    <div class="abstract-blob bg-primary-dim" style="width: min(500px, 40vw); height: min(500px, 40vw); top: -10%; left: -10%;"></div>
    <div class="abstract-blob bg-secondary-container" style="width: min(400px, 35vw); height: min(400px, 35vw); bottom: -5%; right: -5%;"></div>
    <div class="abstract-blob bg-tertiary-container" style="width: min(300px, 25vw); height: min(300px, 25vw); top: 20%; right: 10%;"></div>
    
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    
    <!-- Floating Background Elements for Depth -->
    <div class="fixed top-[15%] right-[5%] w-[min(8rem,10vw)] h-[min(8rem,10vw)] glass-card rounded-3xl rotate-12 -z-10 opacity-20 border-white/5 pointer-events-none"></div>
    <div class="fixed bottom-[10%] left-[20%] w-[min(5rem,8vw)] h-[min(5rem,8vw)] glass-card rounded-full -rotate-45 -z-10 opacity-10 border-white/5 pointer-events-none"></div>
  </body>
</html>
